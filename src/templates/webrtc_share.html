<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacPyCtrl — WebRTC Share (Exp.)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #video-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        video#video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            background: #000;
            image-rendering: auto;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            margin: auto;
        }

        /* Status overlay */
        #status-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 10, 0.95);
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        #status-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .status-icon {
            font-size: 48px;
            margin-bottom: 16px;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-text {
            font-size: 18px;
            color: #aaa;
            letter-spacing: 0.5px;
        }

        .status-subtext {
            font-size: 13px;
            color: #555;
            margin-top: 8px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.95); }
        }

        /* Info badge (top-right) */
        #info-badge {
            position: fixed;
            top: 16px;
            right: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.3s ease;
            font-variant-numeric: tabular-nums;
        }

        #info-badge.visible { opacity: 1; }
        #info-badge:hover { opacity: 1 !important; }

        .badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #30d158;
            box-shadow: 0 0 6px #30d158;
            flex-shrink: 0;
        }

        .badge-dot.disconnected {
            background: #ff453a;
            box-shadow: 0 0 6px #ff453a;
        }
        
        .badge-dot.connecting {
            background: #ffd60a;
            box-shadow: 0 0 6px #ffd60a;
        }

        .badge-sep {
            width: 1px;
            height: 14px;
            background: rgba(255,255,255,0.15);
        }

        .badge-label {
            color: #666;
        }

        .badge-value {
            color: #ddd;
        }

        /* Fullscreen hint */
        #fullscreen-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            font-size: 12px;
            color: #888;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        #fullscreen-hint.visible { opacity: 1; }
    </style>
</head>
<body>

    <!-- Status overlay -->
    <div id="status-overlay">
        <div class="status-icon" id="status-icon">🌐</div>
        <div class="status-text" id="status-text">Negotiating WebRTC Connection...</div>
        <div class="status-subtext" id="status-subtext">Establishing peer-to-peer UDP relay</div>
    </div>

    <!-- Info badge -->
    <div id="info-badge">
        <div class="badge-dot connecting" id="badge-dot"></div>
        <span id="badge-status">Connecting</span>
        <div class="badge-sep"></div>
        <span class="badge-label">Mode</span>
        <span class="badge-value">WebRTC UDP</span>
    </div>

    <!-- NATIVE BROWSER WEBRTC VIDEO PLAYER -->
    <div id="video-container" onclick="toggleFullscreen()">
        <!-- Auto-plays inline without controls for native screen sharing feel -->
        <video id="video" autoplay playsinline muted></video>
    </div>

    <!-- Fullscreen hint -->
    <div id="fullscreen-hint">Click anywhere or press F to toggle fullscreen</div>

    <script>
        const videoElement = document.getElementById('video');
        const statusOverlay = document.getElementById('status-overlay');
        const statusIcon = document.getElementById('status-icon');
        const statusText = document.getElementById('status-text');
        const statusSubtext = document.getElementById('status-subtext');
        const infoBadge = document.getElementById('info-badge');
        const badgeDot = document.getElementById('badge-dot');
        const badgeStatus = document.getElementById('badge-status');
        const fullscreenHint = document.getElementById('fullscreen-hint');

        let pc = null;
        let reconnectTimeout = null;

        function updateBadge(state) {
            badgeDot.className = 'badge-dot';
            if (state === 'connected') {
                badgeStatus.textContent = 'Live';
                badgeDot.classList.add('connected'); // Uses default green background
            } else if (state === 'connecting') {
                badgeStatus.textContent = 'Negotiating';
                badgeDot.classList.add('connecting');
            } else {
                badgeStatus.textContent = 'Offline';
                badgeDot.classList.add('disconnected');
            }
        }

        // Show badge on mouse move
        let badgeHideTimeout;
        document.addEventListener('mousemove', () => {
            infoBadge.classList.add('visible');
            clearTimeout(badgeHideTimeout);
            badgeHideTimeout = setTimeout(() => {
                infoBadge.classList.remove('visible');
            }, 3000);
        });

        // --- WebRTC Connection handling ---

        async function createPeerConnection() {
            if (pc) {
                pc.close();
            }

            statusOverlay.classList.remove('hidden');
            statusIcon.textContent = '🌐';
            statusText.textContent = 'Negotiating WebRTC Connection...';
            statusSubtext.textContent = 'Establishing peer-to-peer UDP transport';
            updateBadge('connecting');

            // Set up local peer connection with a default STUN server just in case
            const config = {
                sdpSemantics: 'unified-plan',
                iceServers: [{ urls: ['stun:stun.l.google.com:19302'] }]
            };

            pc = new RTCPeerConnection(config);

            // Tell the peer what we want to receive
            pc.addTransceiver('video', { direction: 'recvonly' });

            // Hook incoming track event
            pc.addEventListener('track', (evt) => {
                if (evt.track.kind == 'video') {
                    videoElement.srcObject = evt.streams[0];
                    statusOverlay.classList.add('hidden');
                    infoBadge.classList.add('visible');
                    fullscreenHint.classList.add('visible');
                    setTimeout(() => fullscreenHint.classList.remove('visible'), 4000);
                }
            });

            // Handle connection state changes
            pc.addEventListener('connectionstatechange', () => {
                if (pc.connectionState === 'connected') {
                    console.log('WebRTC connected flawlessly!');
                    updateBadge('connected');
                } else if (pc.connectionState === 'failed' || pc.connectionState === 'closed' || pc.connectionState === 'disconnected') {
                    console.error('WebRTC disconnected or failed.');
                    updateBadge('disconnected');
                    
                    statusIcon.textContent = '🔌';
                    statusText.textContent = 'Connection lost';
                    statusSubtext.textContent = 'Attempting to renegotiate in 3 seconds...';
                    statusOverlay.classList.remove('hidden');
                    
                    scheduleReconnect();
                }
            });

            try {
                // Generate SDP Offer
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                // Wait for ICE gathering to complete before sending the offer
                await new Promise((resolve) => {
                    if (pc.iceGatheringState === 'complete') {
                        resolve();
                    } else {
                        const checkState = () => {
                            if (pc.iceGatheringState === 'complete') {
                                pc.removeEventListener('icegatheringstatechange', checkState);
                                resolve();
                            }
                        };
                        pc.addEventListener('icegatheringstatechange', checkState);
                    }
                });

                // Send the generated offer to the Python /offer endpoint!
                const response = await fetch('/offer', {
                    body: JSON.stringify({
                        sdp: pc.localDescription.sdp,
                        type: pc.localDescription.type
                    }),
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    method: 'POST'
                });

                if (!response.ok) {
                    throw new Error('Server returned HTTP status ' + response.status);
                }

                const answer = await response.json();
                
                // Consume the answer from the server
                await pc.setRemoteDescription(answer);

            } catch (e) {
                console.error('WebRTC negotiation failed', e);
                updateBadge('disconnected');
                statusIcon.textContent = '❌';
                statusText.textContent = 'Negotiation Failed';
                statusSubtext.textContent = e.message;
                scheduleReconnect();
            }
        }

        function scheduleReconnect() {
            if (reconnectTimeout) clearTimeout(reconnectTimeout);
            reconnectTimeout = setTimeout(() => {
                createPeerConnection();
            }, 3000);
        }

        // --- Fullscreen ---

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen().catch(() => {});
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'f' || e.key === 'F') toggleFullscreen();
        });

        // Start connection automatically
        createPeerConnection();
    </script>
</body>
</html>
