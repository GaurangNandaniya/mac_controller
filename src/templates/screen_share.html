<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacPyCtrl — Screen Share</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #video-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        img#video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            background: #000;
            image-rendering: auto;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            margin: auto;
        }

        /* Status overlay */
        #status-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 10, 0.95);
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        #status-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .status-icon {
            font-size: 48px;
            margin-bottom: 16px;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-text {
            font-size: 18px;
            color: #aaa;
            letter-spacing: 0.5px;
        }

        .status-subtext {
            font-size: 13px;
            color: #555;
            margin-top: 8px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.95); }
        }

        /* Info badge (top-right) */
        #info-badge {
            position: fixed;
            top: 16px;
            right: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.3s ease;
            font-variant-numeric: tabular-nums;
        }

        #info-badge.visible { opacity: 1; }
        #info-badge:hover { opacity: 1 !important; }

        .badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #30d158;
            box-shadow: 0 0 6px #30d158;
            flex-shrink: 0;
        }

        .badge-dot.disconnected {
            background: #ff453a;
            box-shadow: 0 0 6px #ff453a;
        }

        .badge-sep {
            width: 1px;
            height: 14px;
            background: rgba(255,255,255,0.15);
        }

        .badge-label {
            color: #666;
        }

        .badge-value {
            color: #ddd;
        }

        /* Fullscreen hint */
        #fullscreen-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            font-size: 12px;
            color: #888;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        #fullscreen-hint.visible { opacity: 1; }

        /* Audio enable hint (browser autoplay policy needs a user gesture) */
        #audio-hint {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 22px;
            border-radius: 22px;
            background: rgba(48, 209, 88, 0.16);
            border: 1px solid rgba(48, 209, 88, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-size: 14px;
            color: #30d158;
            z-index: 30;
            cursor: pointer;
            transition: opacity 0.4s ease;
        }
        #audio-hint.hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <!-- Status overlay -->
    <div id="status-overlay">
        <div class="status-icon" id="status-icon">🖥️</div>
        <div class="status-text" id="status-text">Connecting to pure MJPEG stream...</div>
        <div class="status-subtext" id="status-subtext">Hardware-accelerated native playback</div>
    </div>

    <!-- Info badge -->
    <div id="info-badge">
        <div class="badge-dot" id="badge-dot"></div>
        <span id="badge-status">Live</span>
        <div class="badge-sep"></div>
        <span class="badge-label">FPS</span>
        <span class="badge-value" id="badge-fps">--</span>
        <div class="badge-sep"></div>
        <span class="badge-label">Mode</span>
        <span class="badge-value">MJPEG</span>
        <div class="badge-sep"></div>
        <span class="badge-label">BW</span>
        <span class="badge-value" id="badge-bw">--</span>
        <div class="badge-sep"></div>
        <span class="badge-label">Audio</span>
        <span class="badge-value" id="badge-audio">Wait...</span>
    </div>

    <!-- NATIVE BROWSER MJPEG PLAYER -->
    <div id="video-container" onclick="toggleFullscreen()">
        <img id="video" alt="Screen Share Stream" />
    </div>

    <!-- Fullscreen hint -->
    <div id="fullscreen-hint">Click anywhere or press F to toggle fullscreen</div>

    <!-- Audio enable hint (browser autoplay policy needs a user gesture) -->
    <div id="audio-hint">🔊 Tap anywhere to enable audio</div>

    <script>
        const videoImg = document.getElementById('video');
        const statusOverlay = document.getElementById('status-overlay');
        const statusIcon = document.getElementById('status-icon');
        const statusText = document.getElementById('status-text');
        const statusSubtext = document.getElementById('status-subtext');
        const infoBadge = document.getElementById('info-badge');
        const badgeDot = document.getElementById('badge-dot');
        const badgeStatus = document.getElementById('badge-status');
        const fullscreenHint = document.getElementById('fullscreen-hint');
        const badgeFps = document.getElementById('badge-fps');
        const badgeBw = document.getElementById('badge-bw');
        const badgeAudio = document.getElementById('badge-audio');

        let reconnectTimeout = null;
        let statsInterval = null;

        function updateBadge(connected) {
            if (connected) {
                badgeDot.classList.remove('disconnected');
                badgeStatus.textContent = 'Live';
                
                // Start polling stats
                if (!statsInterval) {
                    statsInterval = setInterval(async () => {
                        try {
                            const res = await fetch('/stats');
                            const stats = await res.json();
                            badgeFps.textContent = stats.fps;
                            badgeBw.textContent = formatBytes(stats.bandwidth_bps) + '/s';
                        } catch (e) {
                            badgeFps.textContent = '--';
                            badgeBw.textContent = '--/s';
                        }
                    }, 1000);
                }
            } else {
                badgeDot.classList.add('disconnected');
                badgeStatus.textContent = 'Offline';
                badgeFps.textContent = '--';
                badgeBw.textContent = '--/s';
                
                if (statsInterval) {
                    clearInterval(statsInterval);
                    statsInterval = null;
                }
            }
        }

        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // Show badge on mouse move
        let badgeHideTimeout;
        document.addEventListener('mousemove', () => {
            infoBadge.classList.add('visible');
            clearTimeout(badgeHideTimeout);
            badgeHideTimeout = setTimeout(() => {
                infoBadge.classList.remove('visible');
            }, 3000);
        });

        // --- Connection handling ---

        function connect() {
            statusOverlay.classList.remove('hidden');
            statusIcon.textContent = '🖥️';
            statusText.textContent = 'Connecting to pure MJPEG stream...';
            statusSubtext.textContent = 'Hardware-accelerated native playback';

            // By appending a timestamp, we bypass the browser cache and force a fresh connection Request
            const streamUrl = `/stream?v=${Date.now()}`;
            
            // Rehook img stream
            videoImg.src = streamUrl;
            
            // Connect Audio
            connectAudio();
        }

        // --- System Audio via WebSockets ---
        let audioWs = null;
        let audioCtx = null;
        let nextPlayTime = 0;
        const audioHint = document.getElementById('audio-hint');

        // Browsers keep the AudioContext suspended until a user gesture (autoplay policy),
        // so ANY tap/click/key on the page enables audio — no need to go fullscreen.
        function ensureAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function enableAudio() {
            ensureAudioCtx();
            if (audioCtx && audioCtx.state === 'running') audioHint.classList.add('hidden');
        }
        document.addEventListener('click', enableAudio);
        document.addEventListener('touchstart', enableAudio);
        document.addEventListener('keydown', enableAudio);

        function connectAudio() {
            if (audioWs) audioWs.close();
            
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const audioHost = window.location.hostname + ':9092';
            audioWs = new WebSocket(`${wsProtocol}//${audioHost}/audio_ws`);
            audioWs.binaryType = 'arraybuffer';
            
            audioWs.onopen = () => {
                console.log('Audio WebSocket connected.');
                badgeAudio.textContent = 'Live';
                badgeAudio.style.color = '#30d158';
            };
            
            audioWs.onmessage = (event) => {
                // Autoplay policy: the context stays suspended until a user gesture (see enableAudio()).
                ensureAudioCtx();
                if (audioCtx.state === 'running') audioHint.classList.add('hidden');
                
                const int16Buffer = new Int16Array(event.data);
                
                // Assuming 2 channels, 48000 Hz (Mac OS Default for newer displays/audio)
                const audioBuffer = audioCtx.createBuffer(2, int16Buffer.length / 2, 48000);
                const channelL = audioBuffer.getChannelData(0);
                const channelR = audioBuffer.getChannelData(1);
                
                // De-interleave the Int16Array and convert to Float32 (-1.0 to 1.0)
                for (let i = 0; i < int16Buffer.length / 2; i++) {
                    channelL[i] = int16Buffer[i * 2] / 32768.0;
                    channelR[i] = int16Buffer[i * 2 + 1] / 32768.0;
                }
                
                const source = audioCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioCtx.destination);
                
                // --- Anti-Latency Scheduler ---
                // If the stream gets delayed by network buffering (WebSocket backlog), 
                // the `nextPlayTime` will grow massively into the future.
                // We enforce a strict 250ms maximum latency cap. If we drift further, we drop the backlog.
                const MAX_LATENCY = 0.25; 
                
                if (nextPlayTime > audioCtx.currentTime + MAX_LATENCY) {
                    console.warn("Audio buffer too large! Snapping back to live.");
                    nextPlayTime = audioCtx.currentTime + 0.05; // Force immediate start with 50ms smooth room
                } else if (nextPlayTime < audioCtx.currentTime) {
                    nextPlayTime = audioCtx.currentTime + 0.05;
                }
                
                source.start(nextPlayTime);
                nextPlayTime += audioBuffer.duration;
            };
            
            audioWs.onerror = (e) => {
                console.error('Audio WS Error:', e);
            };
            audioWs.onclose = () => {
                console.log('Audio WS closed');
                badgeAudio.textContent = 'Offline';
                badgeAudio.style.color = '#ff453a';
                // Don't auto-reconnect audio independently, connect() will handle it or wait for video stream
            };
        }

        function scheduleReconnect() {
            if (reconnectTimeout) clearTimeout(reconnectTimeout);
            reconnectTimeout = setTimeout(() => {
                connect();
            }, 3000);
        }

        // Fired when the image starts successfully receiving the multipart stream!
        videoImg.onload = () => {
            console.log('MJPEG stream active');
            statusOverlay.classList.add('hidden');
            infoBadge.classList.add('visible');
            updateBadge(true);
            
            // Hide the fullscreen hint shortly after starting
            fullscreenHint.classList.add('visible');
            setTimeout(() => fullscreenHint.classList.remove('visible'), 4000);
        };

        // Fired if the HTTP stream drops, fails, or the server dies
        videoImg.onerror = (err) => {
            console.warn('MJPEG stream died or failed to connect');
            updateBadge(false);
            
            statusIcon.textContent = '🔌';
            statusText.textContent = 'Connection lost';
            statusSubtext.textContent = 'Reconnecting in 3 seconds...';
            statusOverlay.classList.remove('hidden');
            
            scheduleReconnect();
        };

        // --- Fullscreen ---

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen().catch(() => {});
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'f' || e.key === 'F') toggleFullscreen();
        });

        // --- Start ---
        connect();
    </script>
</body>
</html>
